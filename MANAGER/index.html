        function handleSPARedirect() {
            const path = sessionStorage.getItem('spa_redirect_path');
            if (path) {
                // Eliminar inmediatamente para evitar loops infinitos
                sessionStorage.removeItem('spa_redirect_path');
                
                // Sanitización (Prevención XSS)
                const cleanPath = path.split('?')[0].split('#')[0];
                const regex = /^[a-zA-Z0-9-_\/]+$/;
                
                if (regex.test(cleanPath)) {
                    // Restaurar URL visualmente en el navegador
                    window.history.replaceState(null, null, path);
                    
                    // Mapeo de rutas
                    const upperPath = cleanPath.toUpperCase();
                    if (upperPath.includes('/ENTRENADOR')) {
                        window.initialTab = 'entrenador';
                    } else if (upperPath.includes('/ESCUELAS')) {
                        window.initialTab = 'escuelas';
                    } else {
                        window.initialTab = 'dashboard';
                    }
                } else {
                    console.error("La ruta solicitada falló la validación.");
                    window.initialTab = 'dashboard';
                }
            } else {
                window.initialTab = 'dashboard';
            }
        }
