<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e27">
    <title>Prodigital - Sistema Centralizado</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0a0e27; --bg-darker: #050810; --bg-card: #1a1f3a; --bg-hover: #242d4a;
            --text-primary: #e8eef5; --text-secondary: #a8b2c1; --accent-primary: #00d9ff;
            --accent-success: #00ff88; --accent-danger: #ff4444; --border-subtle: #2a3250;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-darker); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; }
        
        /* Navegación Global */
        nav { background: rgba(10, 14, 39, 0.95); padding: 15px 24px; display: flex; gap: 20px; border-bottom: 1px solid var(--border-subtle); align-items: center; }
        .nav-link { cursor: pointer; color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-link:hover { color: var(--accent-primary); }

        /* Contenedores de vista */
        #main-content { flex: 1; overflow-y: auto; padding: 20px; }
        .view { display: none; max-width: 900px; margin: 0 auto; }
        .active-view { display: block; animation: fade 0.4s; }

        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        
        /* Componentes reutilizables */
        .card { background: var(--bg-card); padding: 30px; border-radius: 16px; border: 1px solid var(--border-subtle); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-m { background: var(--accent-primary); color: var(--bg-dark); }
        
        /* Ajuste específico de la app de asistencia */
        .video-container { width: 100%; height: 300px; background: #000; border-radius: 10px; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight:bold; color:var(--accent-primary); margin-right: 20px;">PRODIGITAL OS</div>
        <div class="nav-link" onclick="switchView('view-home')">🏠 Inicio</div>
        <div class="nav-link" onclick="switchView('view-attendance')">📷 Asistencia</div>
        <div class="nav-link" onclick="switchView('view-saas')">🚀 Solicitar Entorno</div>
        <div class="nav-link" onclick="switchView('view-admin')">👑 Admin</div>
    </nav>

    <div id="main-content">
        
        <div id="view-home" class="view active-view" style="text-align: center; padding-top: 50px;">
            <h1 style="font-size: 3rem; margin-bottom: 20px;">Bienvenido al Portal</h1>
            <p style="color:var(--text-secondary);">Sistema Integrado de Gestión Institucional</p>
            <div style="margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <div class="card" onclick="switchView('view-attendance')" style="cursor:pointer;">Asistencia IA</div>
                <div class="card" onclick="switchView('view-saas')" style="cursor:pointer;">Solicitudes SaaS</div>
                <div class="card" onclick="switchView('view-admin')" style="cursor:pointer;">Panel Maestro</div>
            </div>
        </div>

        <div id="view-attendance" class="view">
            <div class="card">
                <h2>Sistema de Asistencia Inteligente</h2>
                <div class="video-container"><video id="video" autoplay muted playsinline></video></div>
                <button class="btn btn-m" style="margin-top:20px;" onclick="iniciarCamara()">Activar Escáner</button>
            </div>
        </div>

        <div id="view-saas" class="view">
            <div class="card">
                <h2>Solicitar Nuevo Entorno</h2>
                <form id="regForm">
                    <input type="text" id="fInst" placeholder="Institución" style="width:100%; padding:10px; margin-bottom:10px; background:var(--bg-hover); border:none; color:white;">
                    <button type="submit" class="btn btn-m">Enviar Solicitud</button>
                </form>
            </div>
        </div>

        <div id="view-admin" class="view">
            <div class="card">
                <h2>Panel Super Administrador</h2>
                <div id="admin-login-area">
                    <input type="password" id="adminPass" placeholder="Código de acceso">
                    <button class="btn btn-m" onclick="verificarAdmin()">Acceder</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBpGu9Bnr5pQhNBK4kYpoh4GuLkR4CED4c",
            authDomain: "escuela-la-carpio.firebaseapp.com",
            databaseURL: "https://escuela-la-carpio-default-rtdb.firebaseio.com",
            projectId: "escuela-la-carpio",
            storageBucket: "escuela-la-carpio.firebasestorage.app",
            messagingSenderId: "163331007154",
            appId: "1:163331007154:web:2465b1068d6b356cbadfab"
        };
        firebase.initializeApp(firebaseConfig);

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(viewId).classList.add('active-view');
        }

        async function iniciarCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: true});
                document.getElementById('video').srcObject = stream;
            } catch(e) { alert("Error de cámara"); }
        }

        function verificarAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "admin123") {
                alert("Bienvenido, Administrador");
            } else {
                alert("Acceso denegado");
            }
        }
    </script>
</body>
</html>
