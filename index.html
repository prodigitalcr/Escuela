<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e27">
    <meta name="description" content="Sistema de asistencia con IA - Escuela La Carpio">
    <title>Asistencia Facial - Escuela La Carpio</title>
    
    <!-- Firebase (Usando versión 8 por compatibilidad con el código base, pero con tus credenciales) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- Face-API.js (Reconocimiento Facial) -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <!-- PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        /* ============================================
           VARIABLES Y TEMA MINIMALISTA NEGRO
           ============================================ */
        :root {
            --bg-dark: #0a0e27;
            --bg-darker: #050810;
            --bg-card: #1a1f3a;
            --bg-hover: #242d4a;
            --text-primary: #e8eef5;
            --text-secondary: #a8b2c1;
            --text-muted: #7a8299;
            
            --accent-primary: #00d9ff;
            --accent-secondary: #00b8d4;
            --accent-success: #00ff88;
            --accent-warning: #ffb800;
            --accent-danger: #ff4444;
            
            --border-subtle: #2a3250;
            --border-light: #3a4560;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(0, 217, 255, 0.15);
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================
           ANIMACIONES
           ============================================ */
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 217, 255, 0.2), var(--shadow-md); }
            50% { box-shadow: 0 0 30px rgba(0, 217, 255, 0.4), var(--shadow-lg); }
        }
        @keyframes success-pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* ============================================
           RESET Y BASE
           ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            animation: fade-in 0.6s ease-out;
        }

        /* ============================================
           NAVBAR MINIMALISTA
           ============================================ */
        .navbar {
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid var(--border-subtle);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 100;
            gap: 16px;
            box-shadow: var(--shadow-md);
        }
        .navbar-title { font-weight: 600; font-size: 1rem; letter-spacing: 1px; color: var(--accent-primary); text-transform: uppercase; flex: 1; }
        .navbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ============================================
           VISTAS PRINCIPALES
           ============================================ */
        #scan-view, #parent-view {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 24px; overflow-y: auto; animation: fade-in 0.4s ease-out;
        }
        #scan-view { display: none; }

        /* ============================================
           TARJETAS MINIMALISTAS
           ============================================ */
        .card {
            background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 32px;
            border-radius: var(--radius-lg); width: 100%; max-width: 480px; box-shadow: var(--shadow-lg);
            animation: slide-up 0.5s ease-out; transition: all var(--transition-normal); position: relative; overflow: hidden;
        }
        .card:hover { border-color: var(--border-light); box-shadow: var(--shadow-lg), var(--shadow-glow); transform: translateY(-4px); }
        .card h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 24px; color: var(--accent-primary); letter-spacing: 0.5px; }

        /* ============================================
           INPUTS Y BOTONES
           ============================================ */
        input[type="text"], input[type="date"], input[type="password"] {
            width: 100%; padding: 12px 16px; font-size: 0.95rem; background: var(--bg-hover);
            border: 1px solid var(--border-subtle); border-radius: var(--radius-md); color: var(--text-primary);
            outline: none; transition: all var(--transition-fast); margin-bottom: 15px;
        }
        input:focus { border-color: var(--accent-primary); background: rgba(0, 217, 255, 0.05); }

        .btn {
            padding: 11px 20px; border: 1px solid transparent; border-radius: var(--radius-md);
            cursor: pointer; font-weight: 600; color: var(--text-primary); display: inline-flex;
            align-items: center; justify-content: center; gap: 8px; font-size: 0.85rem;
            transition: all var(--transition-fast); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-m { background: var(--accent-primary); color: var(--bg-dark); border-color: var(--accent-primary); }
        .btn-m:hover:not(:disabled) { background: var(--accent-secondary); box-shadow: 0 0 20px rgba(0, 217, 255, 0.3); transform: translateY(-2px); }
        .btn-s { background: var(--accent-success); color: var(--bg-dark); border-color: var(--accent-success); }
        .btn-s:hover:not(:disabled) { box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); transform: translateY(-2px); }
        .btn-d { background: var(--accent-danger); color: white; border-color: var(--accent-danger); }
        .btn-d:hover:not(:disabled) { box-shadow: 0 0 20px rgba(255, 68, 68, 0.3); transform: translateY(-2px); }
        .btn-i { background: var(--accent-secondary); color: white; border-color: var(--accent-secondary); }
        .btn-i:hover:not(:disabled) { box-shadow: 0 0 20px rgba(0, 184, 212, 0.3); transform: translateY(-2px); }
        .btn-w { background: var(--accent-warning); color: var(--bg-dark); border-color: var(--accent-warning); }
        .btn-dark { background: transparent; border: 1px solid var(--border-light); color: var(--text-primary); }
        .btn-full { width: 100%; margin-top: 10px; margin-bottom: 10px; }

        .btn-group { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
        .btn-group .btn { flex: 1; min-width: 110px; }

        /* ============================================
           CÁMARA FACIAL E IA
           ============================================ */
        .video-container {
            position: relative; width: 100%; height: 320px; border-radius: var(--radius-lg);
            overflow: hidden; background: #000; border: 2px solid var(--border-subtle);
            display: none; box-shadow: var(--shadow-lg); transition: all 0.3s;
        }
        .video-container.active { display: block; border-color: var(--accent-primary); animation: glow-pulse 2s infinite; }
        
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* Efecto espejo */ }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        .scan-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 45%, rgba(0, 217, 255, 0.4) 50%, transparent 55%);
            background-size: 100% 200%; animation: scanline 2.5s linear infinite; pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .video-container.scanning .scan-overlay { opacity: 1; }

        .ai-status {
            font-size: 0.85rem; color: var(--accent-warning); text-align: center; margin-top: 10px; font-weight: bold;
        }

        /* ============================================
           RESULTADOS Y MODALES
           ============================================ */
        #resBox {
            margin-top: 15px; display: none; padding: 20px; border-radius: var(--radius-md);
            border: 1px solid var(--border-light); background: var(--bg-hover);
            animation: success-pop 0.4s ease-out; text-align: center;
        }
        #resBox h2 { margin: 0 0 5px 0; font-size: 1.2rem; color: var(--accent-success); }
        #resBox h3 { margin: 0; font-size: 1rem; color: var(--text-secondary); }

        #face-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 2000; display: none; justify-content: center; align-items: center; padding: 20px;
        }

        /* ============================================
           PANEL MAESTRO Y TABLAS (Manteniendo diseño base)
           ============================================ */
        #master-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 1000; padding: 24px; box-sizing: border-box;
            overflow-y: auto; border: 1px solid var(--border-subtle);
        }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px; }
        .panel-header h1 { color: var(--accent-primary); margin: 0; font-size: 1.5rem; flex: 1; }
        .tabs-container { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border-subtle); }
        .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: transparent; border-bottom: 2px solid transparent; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; }
        .tab-btn.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); }
        
        .power-bar { background: var(--bg-hover); padding: 16px; border-radius: var(--radius-md); display: flex; gap: 12px; margin-bottom: 20px; border: 1px solid var(--border-subtle); flex-wrap: wrap; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 12px; background: transparent; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
        thead { background: var(--bg-hover); border-bottom: 1px solid var(--border-light); }
        th { padding: 14px 16px; text-align: left; font-size: 0.8rem; font-weight: 700; color: var(--accent-primary); text-transform: uppercase; }
        td { border-bottom: 1px solid var(--border-subtle); padding: 12px 16px; color: var(--text-primary); }
        tbody tr:hover { background: var(--bg-hover); border-left: 3px solid var(--accent-primary); }

        .status-badge { padding: 4px 8px; border-radius: var(--radius-sm); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .status-in { background: rgba(0, 255, 136, 0.15); color: var(--accent-success); border: 1px solid rgba(0, 255, 136, 0.3); }
        .status-none { background: rgba(255, 68, 68, 0.15); color: var(--accent-danger); border: 1px solid rgba(255, 68, 68, 0.3); }
        .face-yes { color: var(--accent-primary); font-weight: bold; }
        .face-no { color: var(--text-muted); }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-card); }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

        @media print { .no-print { display: none !important; } body { background: white; color: black; } }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar no-print">
        <div class="navbar-title">🤖 Asistencia IA</div>
        <div class="navbar-actions">
            <button class="btn btn-w" onclick="mostrarVista('parent-view')" title="Consulta para padres">👨‍👩‍👧 Padres</button>
            <button class="btn btn-i" onclick="pedirClaveEscaner()" title="Acceso al escáner">📷 Escáner Facial</button>
            <button class="btn btn-m" onclick="pedirClaveMaster()" title="Panel administrativo">🔓 Admin</button>
        </div>
    </div>

    <!-- VISTA DE ESCANEO FACIAL -->
    <div id="scan-view">
        <div class="card" style="max-width: 550px;">
            <h2 style="text-align: center;">🤖 Reconocimiento Facial</h2>
            
            <div id="scan-video-container" class="video-container">
                <video id="scan-video" autoplay muted playsinline></video>
                <canvas id="scan-canvas"></canvas>
                <div class="scan-overlay"></div>
            </div>
            
            <p id="scan-ai-status" class="ai-status">Esperando activación...</p>

            <button id="btnCamaraMain" class="btn btn-i btn-full" onclick="toggleScanner()">🟢 Iniciar Escáner</button>
            
            <div style="text-align: center; margin: 15px 0; color: var(--text-muted); font-size: 0.9rem;">
                - O ingreso manual -
            </div>
            <input type="text" id="lector" placeholder="Escribir cédula y presionar Enter..." style="text-align:center;">

            <div id="resBox">
                <h2 id="resNombre"></h2>
                <h3 id="resMov"></h3>
            </div>

            <div class="btn-group">
                <button class="btn btn-w" onclick="mostrarAyuda('escaneo')">❓ Ayuda</button>
                <button class="btn btn-d" onclick="cerrarVistaProtegida('scan-view')">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- VISTA DE CONSULTA PADRES (Sin cambios lógicos profundos) -->
    <div id="parent-view">
        <div class="card">
            <h2>👨‍👩‍👧 Consulta</h2>
            <input type="text" id="parentInput" placeholder="Cédula del estudiante..." style="text-align:center;">
            <button class="btn btn-s btn-full" onclick="consultarPadre()">Buscar</button>
            
            <div id="parentResult" style="display:none; margin-top:20px;">
                <div style="background: var(--bg-hover); padding:16px; border-radius:10px; border:1px solid var(--border-subtle); margin-bottom:15px;">
                    <h3 id="parentStudentName" style="color:var(--accent-primary); margin-bottom:5px;"></h3>
                    <p id="parentStudentPuesto" style="color:var(--text-secondary);"></p>
                    <button id="btnConsultaWA" class="btn btn-w btn-full">💬 Consultar por WhatsApp</button>
                </div>
                <div id="parentLogList" style="max-height: 200px; overflow-y:auto; border:1px solid var(--border-subtle); border-radius:10px; padding:10px;"></div>
            </div>
            <button class="btn btn-dark btn-full" onclick="document.getElementById('parentResult').style.display='none'; document.getElementById('parentInput').value='';">🔄 Nueva Consulta</button>
        </div>
    </div>

    <!-- PANEL MAESTRO -->
    <div id="master-panel">
        <div class="panel-header">
            <h1>⚙️ Administración IA</h1>
            <div class="panel-header-actions" style="display:flex; gap:8px;">
                <button class="btn btn-s" onclick="editarNumeroJunta()">📱 Tel</button>
                <button class="btn btn-d" onclick="cerrarMaster()">❌ Salir</button>
            </div>
        </div>

        <div class="tabs-container">
            <button id="tab1" class="tab-btn active" onclick="cambiarTab(1)">👥 Miembros y Rostros</button>
            <button id="tab2" class="tab-btn" onclick="cambiarTab(2)">📊 Reportes</button>
        </div>

        <!-- SECCIÓN MIEMBROS -->
        <div id="sec-alumnos">
            <div class="power-bar no-print">
                <div>
                    <button class="btn btn-i" onclick="agregarMiembroManual()">➕ Nuevo Estudiante</button>
                    <button class="btn btn-m" onclick="sincronizarConNube()">💾 Guardar Cambios</button>
                    <span id="admin-ai-status" class="ai-status" style="margin-left: 15px; display:inline-block;">IA No cargada</span>
                </div>
            </div>
            
            <input type="text" id="busqueda" placeholder="🔍 Buscar estudiante..." onkeyup="filtrarRapido()">
            
            <table>
                <thead>
                    <tr>
                        <th>Asistencia Hoy</th>
                        <th>Cédula</th>
                        <th>Nombre</th>
                        <th>Sección</th>
                        <th>Rostro IA</th>
                        <th class="no-print">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaAlumnos"></tbody>
            </table>
        </div>

        <!-- SECCIÓN REPORTE -->
        <div id="sec-reporte" style="display:none;">
            <div class="power-bar no-print">
                <div style="display:flex; gap:10px; align-items:center;">
                    <label style="color: var(--text-secondary); font-weight:bold;">Fecha:</label>
                    <input type="date" id="reportDate" style="margin:0; max-width:150px;">
                </div>
                <div style="display:flex; gap:5px;">
                    <button class="btn btn-s" onclick="filtrarVistaReporte('ENTRADA')">✅ Llegaron</button>
                    <button class="btn btn-m" onclick="filtrarVistaReporte('SALIDA')">🚪 Salieron</button>
                    <button class="btn btn-d" onclick="filtrarVistaReporte('AUSENTES')">❌ Ausentes</button>
                    <button class="btn btn-i" onclick="filtrarVistaReporte('TODOS')">📋 Todos</button>
                </div>
                <div style="display:flex; gap:5px;">
                    <button class="btn btn-w" onclick="exportarPDFReporte()">📕 PDF</button>
                </div>
            </div>
            <h2 id="tituloReporte" style="color:var(--accent-primary); text-align:center; margin:20px 0;">Seleccione un filtro</h2>
            <table id="tabla-logs-final">
                <thead id="headReporte"></thead>
                <tbody id="cuerpoReporte"></tbody>
            </table>
        </div>
    </div>

    <!-- MODAL DE CAPTURA DE ROSTRO (ADMIN) -->
    <div id="face-modal">
        <div class="card" style="text-align:center; max-width: 500px;">
            <h2>📸 Registrar Rostro</h2>
            <p style="color:var(--text-secondary); margin-bottom: 15px;">Estudiante: <b id="modal-student-name" style="color:var(--text-primary);"></b></p>
            
            <div id="reg-video-container" class="video-container active">
                <video id="reg-video" autoplay muted playsinline></video>
                <canvas id="reg-canvas"></canvas>
            </div>
            
            <p id="reg-status" style="margin-top: 15px; font-weight: bold; color: var(--accent-warning);">Buscando rostro...</p>

            <div class="btn-group">
                <button id="btnCaptureFace" class="btn btn-s" disabled onclick="capturarYGuardarRostro()">💾 Guardar Rostro</button>
                <button class="btn btn-d" onclick="cerrarFaceModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN FIREBASE (Con tus credenciales)
        // ============================================
        let NUMERO_OFICIAL_JUNTA = "88888888"; 
        
        // Credenciales extraídas del archivo "credenciales.txt"
        const firebaseConfig = {
            apiKey: "AIzaSyBpGu9Bnr5pQhNBK4kYpoh4GuLkR4CED4c",
            authDomain: "escuela-la-carpio.firebaseapp.com",
            databaseURL: "https://escuela-la-carpio-default-rtdb.firebaseio.com",
            projectId: "escuela-la-carpio",
            storageBucket: "escuela-la-carpio.firebasestorage.app",
            messagingSenderId: "163331007154",
            appId: "1:163331007154:web:2465b1068d6b356cbadfab",
            measurementId: "G-8EBFX04XVC"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let db = { personas: {} };
        let logsGlobal = [];
        let passMaster = "CARPIO2026";
        let passEscaner = "1234";

        document.getElementById('reportDate').value = new Date().toLocaleDateString('sv-SE');
        database.ref('config/numeroOficial').on('value', (s) => { if(s.val()) NUMERO_OFICIAL_JUNTA = s.val(); });

        // ============================================
        // ESTADO DE INTELIGENCIA ARTIFICIAL
        // ============================================
        let iaCargada = false;
        let faceMatcher = null;
        let scannerActivo = false;
        let enCooldown = false;
        let streamActual = null;
        
        // Variables para registro de admin
        let idCapturaActual = null;
        let descriptorDetectado = null;
        let registroLoopId = null;

        // Cargar modelos desde CDN confiable
        async function inicializarIA() {
            if(iaCargada) return;
            actualizarEstadoIA("Descargando modelos de IA (10MB)... Espera por favor.");
            
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            
            try {
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                iaCargada = true;
                actualizarEstadoIA("✅ Inteligencia Artificial Lista");
                construirFaceMatcher();
            } catch (err) {
                console.error(err);
                actualizarEstadoIA("❌ Error cargando IA. Revisa tu conexión.");
            }
        }

        function actualizarEstadoIA(msg) {
            document.getElementById('scan-ai-status').innerText = msg;
            document.getElementById('admin-ai-status').innerText = msg;
        }

        // Construir base de datos de rostros en memoria
        function construirFaceMatcher() {
            if(!iaCargada) return;
            const labeledDescriptors = [];
            
            for (const id in db.personas) {
                const persona = db.personas[id];
                if (persona.descriptor && persona.descriptor.length === 128) {
                    // Convertir array normal de Firebase a Float32Array requerido por face-api
                    const floatArray = new Float32Array(persona.descriptor);
                    labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(id, [floatArray]));
                }
            }
            
            if (labeledDescriptors.length > 0) {
                // Tolerancia de 0.5 (Más bajo = más estricto. 0.5 es buen balance)
                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.5);
                console.log("FaceMatcher actualizado. Rostros entrenados:", labeledDescriptors.length);
            } else {
                faceMatcher = null;
                console.log("No hay rostros registrados aún.");
            }
        }

        // ============================================
        // LÓGICA DE BASE DE DATOS BÁSICA
        // ============================================
        function coincideFecha(horaLog, fechaInputISO) {
            if(!horaLog || !fechaInputISO) return false;
            let [y, m, d] = fechaInputISO.split('-');
            const str = horaLog;
            return str.includes(`${m}/${d}/${y}`) || str.includes(`${m.padStart(2,'0')}/${d}/${y}`) || str.includes(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`);
        }

        database.ref('personas').on('value', (s) => { 
            db.personas = s.val() || {}; 
            renderAlumnos(); 
            construirFaceMatcher(); // Reconstruir buscador si alguien nuevo se registra
        });
        
        database.ref('logs').on('value', (s) => { 
            logsGlobal = []; 
            s.forEach(c => { let val = c.val(); val.key = c.key; logsGlobal.push(val); });
            renderAlumnos(); 
        });

        // ============================================
        // LÓGICA DE REGISTRO (ASISTENCIA)
        // ============================================
        function procesarEscaneo(id) {
            id = id.trim();
            if(db.personas[id]) {
                const hISO = new Date().toLocaleDateString('sv-SE');
                const marcas = logsGlobal.filter(l => (l.fechaISO?l.fechaISO===hISO:coincideFecha(l.hora, hISO)) && l.id === id);
                const tieneE = marcas.some(l => l.tipo === 'ENTRADA');
                const tieneS = marcas.some(l => l.tipo === 'SALIDA');
                
                let tipo = "";
                if (!tieneE) tipo = "ENTRADA"; 
                else if (!tieneS) tipo = "SALIDA"; 
                else { 
                    mostrarMensajeTemp("Ya registró Entrada y Salida hoy.", "var(--accent-warning)"); 
                    return; 
                }
                
                database.ref('logs').push({ id: id, nombre: db.personas[id].nombre, hora: new Date().toLocaleString(), fechaISO: hISO, tipo: tipo });
                
                const res = document.getElementById('resBox'); 
                res.style.display = 'block'; 
                res.style.background = tipo === "ENTRADA" ? "rgba(0, 255, 136, 0.1)" : "rgba(255, 68, 68, 0.1)";
                document.getElementById('resNombre').innerText = db.personas[id].nombre; 
                document.getElementById('resMov').innerText = (tipo === "ENTRADA" ? "✅ Entrada" : "🚪 Salida") + " Registrada";
                
                // Efecto visual y cooldown
                document.getElementById('scan-video-container').style.borderColor = "var(--accent-success)";
                setTimeout(() => {
                    res.style.display = 'none';
                    document.getElementById('scan-video-container').style.borderColor = "var(--accent-primary)";
                }, 3000);
            } else {
                mostrarMensajeTemp("ID no reconocido.", "var(--accent-danger)");
            }
        }

        function mostrarMensajeTemp(msg, color) {
            const status = document.getElementById('scan-ai-status');
            const old = status.innerText;
            status.innerText = msg;
            status.style.color = color;
            setTimeout(() => { status.innerText = old; status.style.color = "var(--accent-warning)"; }, 3000);
        }

        // Ingreso manual por Enter
        document.getElementById('lector').addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && e.target.value.trim() !== '') {
                procesarEscaneo(e.target.value);
                e.target.value = '';
            }
        });

        // ============================================
        // ESCÁNER FACIAL (CÁMARA PRINCIPAL)
        // ============================================
        async function toggleScanner() {
            const container = document.getElementById('scan-video-container');
            const btn = document.getElementById('btnCamaraMain');

            if (!scannerActivo) {
                if(!iaCargada) {
                    btn.innerText = "⏳ Cargando IA...";
                    await inicializarIA();
                }
                
                if(!faceMatcher) {
                    alert("Aún no hay rostros registrados en el sistema. Registre alumnos primero desde Administración.");
                }

                try {
                    streamActual = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    const video = document.getElementById('scan-video');
                    video.srcObject = streamActual;
                    
                    container.classList.add('active');
                    container.classList.add('scanning');
                    btn.innerText = "🛑 Detener Escáner";
                    btn.classList.replace('btn-i', 'btn-d');
                    
                    scannerActivo = true;
                    video.addEventListener('play', loopReconocimiento);
                    actualizarEstadoIA("👁️ Escáner Activo. Mirar a la cámara.");
                } catch (err) {
                    alert("Error accediendo a la cámara. Revisa los permisos.");
                    console.error(err);
                }
            } else {
                detenerCamaras();
                container.classList.remove('active');
                container.classList.remove('scanning');
                btn.innerText = "🟢 Iniciar Escáner";
                btn.classList.replace('btn-d', 'btn-i');
                scannerActivo = false;
                actualizarEstadoIA("IA en pausa.");
            }
        }

        async function loopReconocimiento() {
            if(!scannerActivo) return;
            const video = document.getElementById('scan-video');
            const canvas = document.getElementById('scan-canvas');
            
            if(video.paused || video.ended) return setTimeout(loopReconocimiento, 100);

            // Preparar dimensiones de canvas
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            // Detectar rostro
            const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if(detection) {
                const resized = faceapi.resizeResults(detection, displaySize);
                // Dibujar caja sutil
                const box = resized.detection.box;
                ctx.strokeStyle = "rgba(0, 217, 255, 0.7)";
                ctx.lineWidth = 2;
                ctx.strokeRect(box.x, box.y, box.width, box.height);

                if(faceMatcher && !enCooldown) {
                    // Buscar coincidencia
                    const match = faceMatcher.findBestMatch(detection.descriptor);
                    
                    if(match.label !== 'unknown') {
                        // Coincidencia encontrada!
                        ctx.fillStyle = "rgba(0, 255, 136, 0.8)";
                        ctx.font = "16px Arial";
                        const nombre = db.personas[match.label]?.nombre || match.label;
                        ctx.fillText(nombre, box.x, box.y - 10);
                        
                        procesarEscaneo(match.label);
                        
                        // Cooldown para no marcar múltiples veces por segundo
                        enCooldown = true;
                        setTimeout(() => { enCooldown = false; }, 4000); 
                    } else {
                        ctx.fillStyle = "rgba(255, 68, 68, 0.8)";
                        ctx.font = "16px Arial";
                        ctx.fillText("Desconocido", box.x, box.y - 10);
                    }
                }
            }
            
            // Repetir ciclo cada 150ms (No necesitamos 60fps, ahorra batería)
            setTimeout(loopReconocimiento, 150);
        }

        function detenerCamaras() {
            if (streamActual) {
                streamActual.getTracks().forEach(track => track.stop());
                streamActual = null;
            }
            clearTimeout(registroLoopId);
        }

        // ============================================
        // MODAL DE REGISTRO FACIAL (ADMIN)
        // ============================================
        async function abrirRegistroRostro(id) {
            if(!iaCargada) await inicializarIA();
            
            idCapturaActual = id;
            const persona = db.personas[id];
            document.getElementById('modal-student-name').innerText = persona.nombre + " (" + id + ")";
            document.getElementById('face-modal').style.display = 'flex';
            document.getElementById('btnCaptureFace').disabled = true;
            document.getElementById('reg-status').innerText = "Buscando rostro...";
            document.getElementById('reg-status').style.color = "var(--accent-warning)";

            try {
                streamActual = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('reg-video');
                video.srcObject = streamActual;
                video.addEventListener('play', loopCapturaAdmin);
            } catch (err) {
                alert("Error con la cámara.");
                cerrarFaceModal();
            }
        }

        async function loopCapturaAdmin() {
            const video = document.getElementById('reg-video');
            const canvas = document.getElementById('reg-canvas');
            
            if(!streamActual || video.paused || video.ended) return;

            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const btn = document.getElementById('btnCaptureFace');
            const status = document.getElementById('reg-status');

            if(detection) {
                const resized = faceapi.resizeResults(detection, displaySize);
                faceapi.draw.drawDetections(canvas, resized);
                faceapi.draw.drawFaceLandmarks(canvas, resized); // Muestra los puntos de la cara
                
                descriptorDetectado = Array.from(detection.descriptor); // Convertir a Array normal para Firebase
                
                btn.disabled = false;
                status.innerText = "✅ Rostro detectado. ¡Puede guardar!";
                status.style.color = "var(--accent-success)";
            } else {
                descriptorDetectado = null;
                btn.disabled = true;
                status.innerText = "Mire fijamente a la cámara...";
                status.style.color = "var(--accent-warning)";
            }
            
            registroLoopId = setTimeout(loopCapturaAdmin, 200);
        }

        function capturarYGuardarRostro() {
            if(idCapturaActual && descriptorDetectado) {
                db.personas[idCapturaActual].descriptor = descriptorDetectado;
                sincronizarConNube(); // Guarda en Firebase
                alert("Rostro guardado exitosamente.");
                cerrarFaceModal();
                construirFaceMatcher(); // Reconstruir IA con la nueva cara
            }
        }

        function cerrarFaceModal() {
            document.getElementById('face-modal').style.display = 'none';
            detenerCamaras();
            idCapturaActual = null;
            descriptorDetectado = null;
        }


        // ============================================
        // FUNCIONES ADMINISTRATIVAS Y TABLAS
        // ============================================
        function renderAlumnos() {
            const t = document.getElementById('tablaAlumnos'); 
            t.innerHTML = "";
            const hISO = new Date().toLocaleDateString('sv-SE');
            const pres = [...new Set(logsGlobal.filter(l => (l.fechaISO?l.fechaISO===hISO:coincideFecha(l.hora, hISO)) && l.tipo === 'ENTRADA').map(l => l.id))];
            
            Object.entries(db.personas).forEach(([id, p]) => {
                const isP = pres.includes(id);
                const tieneRostro = p.descriptor && p.descriptor.length === 128;
                
                t.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td><span class="status-badge ${isP?'status-in':'status-none'}">${isP?'✓ Entró':'✗ No'}</span></td>
                        <td><b>${id}</b></td>
                        <td><input style="border:none;background:transparent;color:var(--text-primary);width:100%" value="${p.nombre}" onchange="db.personas['${id}'].nombre=this.value"></td>
                        <td><input style="border:none;background:transparent;color:var(--text-secondary);font-weight:bold;width:100%" value="${p.puesto||''}" onchange="db.personas['${id}'].puesto=this.value"></td>
                        <td>
                            <span class="${tieneRostro ? 'face-yes' : 'face-no'}">${tieneRostro ? '👤 Sí' : '👤 No'}</span>
                        </td>
                        <td class="no-print">
                            <button class="btn btn-m" style="padding: 6px 10px;" onclick="abrirRegistroRostro('${id}')" title="Registrar Rostro">📷</button>
                            <button class="btn btn-d" style="padding: 6px 10px;" onclick="if(confirm('¿Borrar estudiante?')) { database.ref('personas/'+'${id}').remove(); }" title="Eliminar">🗑️</button>
                        </td>
                    </tr>
                `);
            });
        }

        function agregarMiembroManual() { 
            const id = prompt("Cédula:"); 
            if(id) { 
                db.personas[id] = { nombre: prompt("Nombre:"), puesto: prompt("Sección:") }; 
                renderAlumnos(); 
            } 
        }

        function sincronizarConNube() { 
            database.ref('personas').set(db.personas); 
            alert("Base de datos guardada en la nube."); 
        }

        // ============================================
        // VISTAS DE NAVEGACIÓN Y REPORTES
        // ============================================
        function mostrarVista(id) { 
            document.getElementById('scan-view').style.display = (id==='scan-view')?'flex':'none'; 
            document.getElementById('parent-view').style.display = (id==='parent-view')?'flex':'none'; 
            if(id!=='scan-view' && scannerActivo) toggleScanner(); 
        }
        
        function pedirClaveEscaner() { if(prompt("Clave de escáner:") === passEscaner) mostrarVista('scan-view'); }
        function pedirClaveMaster() { if(prompt("Clave Admin:") === passMaster) { document.getElementById('master-panel').style.display = 'block'; inicializarIA(); } }
        function cerrarMaster() { document.getElementById('master-panel').style.display = 'none'; detenerCamaras(); }
        function cerrarVistaProtegida(id) { document.getElementById(id).style.display = 'none'; mostrarVista('parent-view'); detenerCamaras(); }
        
        function cambiarTab(n) { 
            document.getElementById('sec-alumnos').style.display = (n===1)?'block':'none'; 
            document.getElementById('sec-reporte').style.display = (n===2)?'block':'none'; 
            document.getElementById('tab1').className = (n===1)?'tab-btn active':'tab-btn'; 
            document.getElementById('tab2').className = (n===2)?'tab-btn active':'tab-btn'; 
        }

        function filtrarRapido() { 
            let f = document.getElementById('busqueda').value.toUpperCase(); 
            let rows = document.getElementById("tablaAlumnos").getElementsByTagName("tr"); 
            for (let i = 0; i < rows.length; i++) { 
                rows[i].style.display = (rows[i].textContent.toUpperCase().indexOf(f) > -1) ? "" : "none"; 
            } 
        }

        // Consulta de padres (Igual al original)
        function consultarPadre() {
            const id = document.getElementById('parentInput').value.trim();
            if(!db.personas[id]) return alert("Cédula no encontrada.");
            const p = db.personas[id];
            document.getElementById('parentStudentName').innerText = p.nombre;
            document.getElementById('parentStudentPuesto').innerText = "Sección: " + (p.puesto || "N/A");
            
            document.getElementById('btnConsultaWA').onclick = () => { 
                const mensaje = `Hola, quisiera realizar una consulta sobre el estudiante: ${p.nombre} (ID: ${id}).`;
                window.open(`https://wa.me/506${NUMERO_OFICIAL_JUNTA}?text=${encodeURIComponent(mensaje)}`, '_blank');
            };
            
            database.ref('logs').orderByChild('id').equalTo(id).once('value', (s) => {
                const list = document.getElementById('parentLogList'); list.innerHTML = "";
                if(s.exists()){ s.forEach(c => { let l=c.val(); list.innerHTML = `<div style="padding:10px; border-bottom:1px solid #3a4560;"><span>${l.hora}</span> - <b style="color:${l.tipo==='ENTRADA'?'#00ff88':'#ff4444'}">${l.tipo}</b></div>` + list.innerHTML; }); }
                else { list.innerHTML = "<p style='color: var(--text-muted); text-align:center;'>Sin registros.</p>"; }
                document.getElementById('parentResult').style.display = 'block';
            });
        }

        function filtrarVistaReporte(tipo) {
            const fechaBuscada = document.getElementById('reportDate').value;
            if(!fechaBuscada) return alert("Seleccione una fecha");
            const cuerpo = document.getElementById('cuerpoReporte');
            const head = document.getElementById('headReporte');
            const titulo = document.getElementById('tituloReporte');
            cuerpo.innerHTML = "";
            let logsDelDia = logsGlobal.filter(l => l.fechaISO ? l.fechaISO === fechaBuscada : coincideFecha(l.hora, fechaBuscada));

            if(tipo === 'ENTRADA' || tipo === 'SALIDA') {
                titulo.innerText = tipo === 'ENTRADA' ? `✅ Llegaron` : `🚪 Salieron`;
                head.innerHTML = `<tr><th>Hora</th><th>Cédula</th><th>Nombre</th><th>Sección</th></tr>`;
                const filtrados = logsDelDia.filter(l => l.tipo === tipo);
                filtrados.forEach(l => {
                    const p = db.personas[l.id] || {};
                    let h = l.hora.includes(',') ? l.hora.split(',')[1] : l.hora;
                    cuerpo.insertAdjacentHTML('beforeend', `<tr><td>${h}</td><td><b>${l.id}</b></td><td>${l.nombre}</td><td>${p.puesto || '-'}</td></tr>`);
                });
            } else if(tipo === 'TODOS') {
                titulo.innerText = `📋 Todos los Movimientos`;
                head.innerHTML = `<tr><th>Hora</th><th>Cédula</th><th>Nombre</th><th>Tipo</th><th>Sección</th></tr>`;
                logsDelDia.forEach(l => {
                    const p = db.personas[l.id] || {};
                    let h = l.hora.includes(',') ? l.hora.split(',')[1] : l.hora;
                    cuerpo.insertAdjacentHTML('beforeend', `<tr><td>${h}</td><td><b>${l.id}</b></td><td>${l.nombre}</td><td><span class="status-badge ${l.tipo === 'ENTRADA' ? 'status-in' : 'status-none'}">${l.tipo}</span></td><td>${p.puesto || '-'}</td></tr>`);
                });
            } else {
                titulo.innerText = `❌ Ausentes`;
                head.innerHTML = `<tr><th>Cédula</th><th>Nombre</th><th>Sección</th></tr>`;
                const presentes = [...new Set(logsDelDia.filter(l => l.tipo === 'ENTRADA').map(l => l.id))];
                Object.entries(db.personas).forEach(([id, p]) => {
                    if(!presentes.includes(id)) {
                        cuerpo.insertAdjacentHTML('beforeend', `<tr><td><b>${id}</b></td><td>${p.nombre}</td><td>${p.puesto || '-'}</td></tr>`);
                    }
                });
            }
        }

        function exportarPDFReporte() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text(document.getElementById('tituloReporte').innerText, 14, 20);
            doc.autoTable({ html: '#tabla-logs-final', startY: 30, theme: 'grid' });
            doc.save(`Reporte_Asistencia_${document.getElementById('reportDate').value}.pdf`);
        }

        function mostrarAyuda(t) { alert("SISTEMA DE RECONOCIMIENTO FACIAL\n\n1. Asegúrese de que el estudiante esté registrado y tenga su rostro guardado en el sistema (Admin).\n2. Presione 'Iniciar Escáner'.\n3. El estudiante debe mirar a la cámara. Si hay coincidencia, la asistencia se registrará sola."); }

    </script>
