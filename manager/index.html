<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Master - Control de Tenants</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-dark: #0a0e27; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">

    <nav class="flex justify-between items-center mb-10 pb-6 border-b border-gray-700">
        <div>
            <h1 class="text-3xl font-bold text-cyan-400 tracking-tight">SaaS Master</h1>
            <p class="text-gray-400">Panel de Control de Tenancy Escolar</p>
        </div>
        <div class="flex gap-4">
            <button onclick="toggleModal('modal-new-tenant')" class="bg-cyan-600 hover:bg-cyan-500 px-6 py-2 rounded-lg font-semibold transition">
                + Nuevo Tenant
            </button>
        </div>
    </nav>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
            <h3 class="text-gray-400 text-sm">Escuelas Activas</h3>
            <p class="text-4xl font-bold mt-2" id="stat-count">0</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
            <h3 class="text-gray-400 text-sm">Usuarios Totales</h3>
            <p class="text-4xl font-bold mt-2">0</p>
        </div>
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
            <h3 class="text-gray-400 text-sm">Servidores Salud</h3>
            <p class="text-4xl font-bold mt-2 text-green-400">100%</p>
        </div>
    </div>

    <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden shadow-lg">
        <table class="w-full text-left">
            <thead class="bg-gray-900 border-b border-gray-700">
                <tr>
                    <th class="p-4">Tenant ID</th>
                    <th class="p-4">Nombre de Escuela</th>
                    <th class="p-4">Estado</th>
                    <th class="p-4 text-right">Acciones</th>
                </tr>
            </thead>
            <tbody id="tenant-list">
                <!-- Data injected via JS -->
            </tbody>
        </table>
    </div>

    <div id="modal-new-tenant" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4">
        <div class="bg-gray-900 p-8 rounded-2xl w-full max-w-md border border-gray-700">
            <h2 class="text-xl font-bold mb-6">Configurar Nueva Escuela</h2>
            <input type="text" id="school-name" placeholder="Nombre de la Institución" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-600 mb-4">
            <input type="text" id="school-id" placeholder="Código Único (Ej: ESC-01)" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-600 mb-6">
            <div class="flex gap-4">
                <button onclick="createTenant()" class="flex-1 bg-cyan-600 py-2 rounded-lg font-bold">Crear Instancia</button>
                <button onclick="toggleModal('modal-new-tenant')" class="flex-1 bg-gray-700 py-2 rounded-lg">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // Simulación de persistencia de datos (en producción usar Firestore)
        let tenants = [
            { id: "01", name: "Escuela Central", active: true },
            { id: "02", name: "Liceo del Norte", active: true }
        ];

        function renderTenants() {
            const list = document.getElementById('tenant-list');
            list.innerHTML = tenants.map(t => `
                <tr class="border-b border-gray-700 hover:bg-gray-750 transition">
                    <td class="p-4 font-mono text-cyan-300">${t.id}</td>
                    <td class="p-4 font-medium">${t.name}</td>
                    <td class="p-4">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${t.active ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}">
                            ${t.active ? 'ACTIVO' : 'SUSPENDIDO'}
                        </span>
                    </td>
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick="copyLink('${t.id}')" class="text-sm bg-gray-700 px-3 py-1 rounded hover:bg-gray-600">Link</button>
                        <button onclick="deleteTenant('${t.id}')" class="text-sm bg-red-900 text-red-200 px-3 py-1 rounded hover:bg-red-800">Eliminar</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('stat-count').innerText = tenants.length;
        }

        function createTenant() {
            const name = document.getElementById('school-name').value;
            const id = document.getElementById('school-id').value;
            if(!name || !id) return;
            tenants.push({ id, name, active: true });
            renderTenants();
            toggleModal('modal-new-tenant');
        }

        function toggleModal(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
        }

        function copyLink(id) {
            const link = window.location.origin + "/school_app.html?id=" + id;
            navigator.clipboard.writeText(link);
            // Simple visual feedback instead of browser alert
            console.log("Copiado: " + link);
        }

        function deleteTenant(id) {
            tenants = tenants.filter(t => t.id !== id);
            renderTenants();
        }

        window.onload = renderTenants;
    </script>
</body>
</html>
