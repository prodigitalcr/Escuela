<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e27">
    <title>SaaS Prodigital - Solicitud de Entorno</title>
    
    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg-dark: #0a0e27; --bg-darker: #050810; --bg-card: #1a1f3a; --bg-hover: #242d4a;
            --text-primary: #e8eef5; --text-secondary: #a8b2c1; --border-subtle: #2a3250;
            --accent-primary: #00d9ff; --accent-secondary: #00b8d4; 
            --accent-success: #00ff88; --accent-danger: #ff4444;
            --radius-md: 10px; --radius-lg: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            color: var(--text-primary); display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .card {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            padding: 32px; border-radius: var(--radius-lg); width: 100%; max-width: 500px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        }
        h2 { color: var(--accent-primary); text-align: center; margin-bottom: 10px; font-size: 1.5rem; }
        p.subtitle { color: var(--text-secondary); text-align: center; margin-bottom: 24px; font-size: 0.9rem; line-height: 1.5; }
        
        input {
            width: 100%; padding: 14px 16px; font-size: 0.95rem; background: var(--bg-hover);
            border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
            color: var(--text-primary); margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent-primary); box-shadow: 0 0 8px rgba(0,217,255,0.2); }
        
        .btn {
            width: 100%; padding: 14px; background: var(--accent-primary); color: var(--bg-dark);
            border: none; border-radius: var(--radius-md); font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.5px; transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { background: var(--accent-secondary); box-shadow: 0 0 15px rgba(0,217,255,0.4); }
        
        #resBox {
            display: none; margin-top: 20px; padding: 20px; border-radius: var(--radius-md); text-align: center;
        }
        #resBox.success {
            background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3);
        }
        #resBox.success h3 { color: var(--accent-success); margin-bottom: 8px; }
        
        #resBox.error {
            background: rgba(255, 68, 68, 0.1); border: 1px solid rgba(255, 68, 68, 0.3);
        }
        #resBox.error h3 { color: var(--accent-danger); margin-bottom: 8px; }
        
        #resBox p { color: var(--text-primary); font-size: 0.95rem; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 Solicitar Entorno SaaS</h2>
        <p class="subtitle">Complete el formulario para crear un espacio administrativo aislado y exclusivo para su institución.</p>

        <form id="regForm">
            <input type="text" id="fInstitucion" placeholder="Nombre Oficial de la Institución" required>
            <input type="text" id="fSlug" placeholder="Identificador corto (Ej: colegio-san-jose)" required title="Solo letras minúsculas y guiones">
            <input type="email" id="fEmail" placeholder="Correo del Administrador" required>
            <input type="password" id="fPass" placeholder="Contraseña segura para su cuenta" required minlength="6">
            <input type="tel" id="fTel" placeholder="Número de contacto (WhatsApp)" required>
            
            <button type="submit" class="btn" id="btnSubmit">Solicitar Aprovisionamiento</button>
        </form>

        <div id="resBox"></div>
    </div>

    <script>
        // Configuración de Firebase Prodigital (Escuela La Carpio)
        const firebaseConfig = {
            apiKey: "AIzaSyBpGu9Bnr5pQhNBK4kYpoh4GuLkR4CED4c",
            authDomain: "escuela-la-carpio.firebaseapp.com",
            databaseURL: "https://escuela-la-carpio-default-rtdb.firebaseio.com",
            projectId: "escuela-la-carpio",
            storageBucket: "escuela-la-carpio.firebasestorage.app",
            messagingSenderId: "163331007154",
            appId: "1:163331007154:web:2465b1068d6b356cbadfab"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerText = "Procesando...";
            btnSubmit.disabled = true;

            const email = document.getElementById('fEmail').value.trim();
            const password = document.getElementById('fPass').value;
            const institucion = document.getElementById('fInstitucion').value.trim();
            const tenant_slug = document.getElementById('fSlug').value.trim();
            const telefono = document.getElementById('fTel').value.trim();

            // Transformación de Slug: Asegura que sea amigable para URLs y Base de datos
            const cleanSlug = tenant_slug.toLowerCase()
                                         .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                                         .replace(/\s+/g, '-')
                                         .replace(/[^a-z0-9-]/g, '');

            // Proceso 1: Creación de usuario Auth
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const uid = userCredential.user.uid;
                    // Proceso 2: Escritura segura en el nodo de solicitudes pendientes
                    return database.ref('solicitudes_pendientes/' + uid).set({
                        tenant_id_sugerido: cleanSlug,
                        nombre_institucion: institucion,
                        email: email,
                        telefono: telefono,
                        fecha_solicitud: new Date().toISOString(),
                        estado: "pendiente"
                    });
                })
                .then(() => {
                    // Éxito: Ocultar formulario y mostrar mensaje de éxito
                    document.getElementById('regForm').style.display = 'none';
                    const resBox = document.getElementById('resBox');
                    resBox.style.display = 'block';
                    resBox.className = 'success';
                    resBox.innerHTML = `<h3>✅ Solicitud Exitosa</h3>
                                        <p>Su entorno SaaS para <b>${cleanSlug}</b> está en proceso de creación.<br><br>Por favor, espere la validación de su pago por parte de nuestro equipo. Una vez aprobado, podrá iniciar sesión con su correo.</p>`;
                })
                .catch((error) => {
                    // Manejo de Errores sin usar Alerts molestos
                    btnSubmit.innerText = "Solicitar Aprovisionamiento";
                    btnSubmit.disabled = false;
                    
                    const resBox = document.getElementById('resBox');
                    resBox.style.display = 'block';
                    resBox.className = 'error';
                    
                    let msgError = "Ha ocurrido un error en el sistema.";
                    if (error.code === 'auth/email-already-in-use') {
                        msgError = "El correo electrónico que intentas usar ya se encuentra registrado en nuestra plataforma.";
                    } else if (error.code === 'auth/weak-password') {
                        msgError = "La contraseña es demasiado débil. Usa al menos 6 caracteres.";
                    } else {
                        msgError = error.message;
                    }
                    
                    resBox.innerHTML = `<h3>⚠️ Error de Registro</h3><p>${msgError}</p>`;
                });
        });

        // Formatea el input del identificador mientras el usuario escribe
        document.getElementById('fSlug').addEventListener('input', function(e) {
            this.value = this.value.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        });
    </script>
</body>
</html>
