<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>OFICIAL AUTENTICADA Manager - SaaS</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <style>
    body { font-family: sans-serif; background: #222f3e; color: #fff; margin: 0; }
    .card { background: #232946; padding: 28px; border-radius: 12px; box-shadow: 0 6px 24px #0009; max-width: 440px; margin: 40px auto; }
    input, textarea, select { border-radius:5px; padding:10px; width:100%; margin-bottom:20px; border:1px solid #aaa; font-size:1rem }
    button { border:none; background:#19bc9b; color:#fff; padding:11px 24px; font-size:1rem; border-radius: 5px; cursor:pointer; margin-right:15px; }
    .block { margin-top:35px; }
    .logout { background:#ff4444; }
  </style>
</head>
<body>
  <div class="card" id="loginCard">
    <h2>🔐 Acceso Admin SaaS</h2>
    <input type="email" id="email" placeholder="Email admin">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
  </div>
  <div class="card block" id="panelCard" style="display:none">
    <h2>⚙️ Panel Manager</h2>
    <label>Seleccionar Escuela:</label>
    <select id="schoolList"></select>
    <label>Mensaje bloqueo personalizado (HTML):</label>
    <textarea rows="5" id="blockMsg"></textarea>
    <div>
      <button onclick="activarEscuela()">Activar</button>
      <button onclick="bloquearEscuela()">Bloquear</button>
      <button onclick="logout()" class="logout">Cerrar sesión</button>
    </div>
    <div id="statusNow" style="margin-top:20px"></div>
  </div>
  <script>
    // Configura tus credenciales SAAS/filtro global:
    firebase.initializeApp({
      apiKey: "AIzaSyBpGu9Bnr5pQhNBK4kYpoh4GuLkR4CED4c",
      authDomain: "escuela-la-carpio.firebaseapp.com",
      projectId: "escuela-la-carpio"
    });
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ================= AUTH básica manager ======================
    function login() {
      const email = emailInput.value.trim(), pass = passInput.value;
      auth.signInWithEmailAndPassword(email, pass).then(() => {
        loginCard.style.display = "none";
        panelCard.style.display = "block";
        cargarEscuelas();
      }).catch(err => alert("Error: "+err.message));
    }
    function logout() {
      auth.signOut();
      panelCard.style.display = "none";
      loginCard.style.display = "block";
    }
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('pass');
    const loginCard = document.getElementById('loginCard');
    const panelCard = document.getElementById('panelCard');
    const statusNow = document.getElementById('statusNow');
    // ==================== Panel firewall =====================
    async function cargarEscuelas() {
      // Puedes tener una colección 'schools' con tus escuelas y sus IDs
      const lista = document.getElementById("schoolList");
      lista.innerHTML = "";
      // Demo estático: cambia por tus datos dinámicos si lo deseas
      const escuelas = [
        { id: "Escuela-Carpio", name: "Escuela La Carpio" },
        // { id: "OtraEscuela", name: "Otro centro" }
      ];
      escuelas.forEach(e => {
        const o = document.createElement("option");
        o.value = e.id; o.textContent = e.name;
        lista.appendChild(o);
      });
      lista.onchange = cargarEstadoActual;
      cargarEstadoActual();
    }
    async function cargarEstadoActual() {
      const id = document.getElementById("schoolList").value;
      const doc = await db.collection('firewall').doc(id).get();
      const data = doc.data() || {};
      document.getElementById('blockMsg').value = data.message || "<div style='text-align:center'><h2>Sitio temporalmente bloqueado</h2></div>";
      statusNow.innerHTML = "Estado: <b>"+(data.status==='blocked' ? '🔴 BLOQUEADO' : '🟢 ACTIVO')+"</b>";
    }
    function activarEscuela() {
      const escuela = document.getElementById('schoolList').value;
      db.collection('firewall').doc(escuela).set({
        status: "active",
        message: document.getElementById('blockMsg').value
      });
      alert("Sitio activado");
      cargarEstadoActual();
    }
    function bloquearEscuela() {
      const escuela = document.getElementById('schoolList').value;
      db.collection('firewall').doc(escuela).set({
        status: "blocked",
        message: document.getElementById('blockMsg').value
      });
      alert("Sitio bloqueado");
      cargarEstadoActual();
    }
  </script>
</body>
</html>
